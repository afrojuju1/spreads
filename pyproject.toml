[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "spreads"
version = "0.1.0"
description = "Alpaca-based options spread scanner"
requires-python = ">=3.11"
dependencies = [
  "msgpack>=1.1.0",
  "websocket-client>=1.8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["calendar_events"]
