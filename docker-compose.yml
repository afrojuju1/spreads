services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: spreads
      POSTGRES_USER: spreads
      POSTGRES_PASSWORD: spreads
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spreads -d spreads"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - spreads_postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
  api:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPREADS_DATABASE_URL: postgresql://spreads:spreads@postgres:5432/spreads
      REDIS_URL: redis://redis:6379/0
      WATCHFILES_FORCE_POLLING: "true"
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--timeout-graceful-shutdown",
        "2",
        "--reload-dir",
        "packages/core",
        "--reload-dir",
        "packages/api",
      ]
    volumes:
      - .:/app
    ports:
      - "58080:8000"
  worker-runtime:
    build:
      context: .
    restart: unless-stopped
    deploy:
      replicas: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPREADS_DATABASE_URL: postgresql://spreads:spreads@postgres:5432/spreads
      REDIS_URL: redis://redis:6379/0
      SPREADS_INTERNAL_API_BASE_URL: http://api:8000
    command: ["uv", "run", "arq", "core.jobs.worker.RuntimeWorkerSettings"]
    volumes:
      - .:/app
  worker-discovery:
    build:
      context: .
    restart: unless-stopped
    deploy:
      replicas: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPREADS_DATABASE_URL: postgresql://spreads:spreads@postgres:5432/spreads
      REDIS_URL: redis://redis:6379/0
      SPREADS_INTERNAL_API_BASE_URL: http://api:8000
    command: ["uv", "run", "arq", "core.jobs.worker.DiscoveryWorkerSettings"]
    volumes:
      - .:/app
  scheduler:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPREADS_DATABASE_URL: postgresql://spreads:spreads@postgres:5432/spreads
      REDIS_URL: redis://redis:6379/0
    command: ["uv", "run", "spreads", "scheduler"]
    volumes:
      - .:/app
  market-recorder:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPREADS_DATABASE_URL: postgresql://spreads:spreads@postgres:5432/spreads
    command: ["uv", "run", "spreads", "market-recorder"]
    volumes:
      - .:/app
  web:
    build:
      context: ./packages/web
      target: dev
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: development
      SPREADS_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_SPREADS_API_WS_PORT: "58080"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./packages/web:/app
      - web_node_modules:/app/node_modules
      - web_next_data:/app/.next
    ports:
      - "53000:3000"

volumes:
  spreads_postgres_data:
  web_node_modules:
  web_next_data:
