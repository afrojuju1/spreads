services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: spreads
      POSTGRES_USER: spreads
      POSTGRES_PASSWORD: spreads
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spreads -d spreads"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - spreads_postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
  api:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPREADS_DATABASE_URL: postgresql://spreads:spreads@postgres:5432/spreads
      REDIS_URL: redis://redis:6379/0
    command: ["uv", "run", "uvicorn", "apps.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "58080:8000"
  worker:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPREADS_DATABASE_URL: postgresql://spreads:spreads@postgres:5432/spreads
      REDIS_URL: redis://redis:6379/0
      SPREADS_INTERNAL_API_BASE_URL: http://api:8000
    command: ["uv", "run", "arq", "spreads.jobs.worker.WorkerSettings"]
  scheduler:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPREADS_DATABASE_URL: postgresql://spreads:spreads@postgres:5432/spreads
      REDIS_URL: redis://redis:6379/0
    command: ["uv", "run", "spreads-scheduler"]
  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: development
      SPREADS_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_SPREADS_API_WS_PORT: "58080"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./apps/web/app:/app/app
      - ./apps/web/components:/app/components
      - ./apps/web/lib:/app/lib
      - ./apps/web/public:/app/public
      - ./apps/web/package.json:/app/package.json:ro
      - ./apps/web/package-lock.json:/app/package-lock.json:ro
      - ./apps/web/next.config.ts:/app/next.config.ts:ro
      - ./apps/web/tsconfig.json:/app/tsconfig.json:ro
      - ./apps/web/postcss.config.mjs:/app/postcss.config.mjs:ro
      - ./apps/web/eslint.config.mjs:/app/eslint.config.mjs:ro
      - ./apps/web/components.json:/app/components.json:ro
      - ./apps/web/next-env.d.ts:/app/next-env.d.ts:ro
      - web_node_modules:/app/node_modules
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    ports:
      - "53000:3000"

volumes:
  spreads_postgres_data:
  web_node_modules:
